name: Build CatStack App

on:
  push:
    tags: ['v*']
    branches: [develop]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_suffix: windows-x64
            archive_ext: zip
          - os: ubuntu-22.04
            asset_suffix: linux-x86_64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Set build identity
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            LABEL="v$(cat VERSION | tr -d '\n\r')"
            CHANNEL=stable
            PREFIX=""
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            LABEL="dev-${SHORT_SHA}"
            CHANNEL=dev
            PREFIX="dev/"
          fi
          echo "label=${LABEL}"     >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}"   >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: pyinstaller desktop/CatStack.spec --clean --noconfirm

      - name: Stage README into bundle
        shell: bash
        run: |
          cat > dist/CatStack/README.txt <<'EOF'
          CatStack - Mining Farm Management System
          ========================================

          Run the dashboard:
            Windows:  double-click CatStack.exe
            Linux:    ./CatStack

          The dashboard opens at http://localhost:8888
          (override the port with the CATSTACK_PORT env var)

          Use as CLI (same binary, pass args):
            CatStack rig list
            CatStack status
            CatStack --help

          Data lives in ~/.mfarm/ (override with MFARM_HOME env var).
          EOF

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $name = "CatStack-${{ steps.ver.outputs.label }}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path dist/CatStack/* -DestinationPath $name
          "ASSET=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          name="CatStack-${{ steps.ver.outputs.label }}-${{ matrix.asset_suffix }}.tar.gz"
          tar -C dist -czf "$name" CatStack
          echo "ASSET=$name" >> "$GITHUB_ENV"

      - name: Smoke-test the binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BIN=./dist/CatStack/CatStack.exe
          else
            BIN=./dist/CatStack/CatStack
          fi
          "$BIN" --version
          "$BIN" --help
          "$BIN" rig list

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            powershell -Command "(Get-FileHash -Algorithm SHA256 '$ASSET').Hash.ToLower() + '  ' + '$ASSET'" > "$ASSET.sha256"
          fi

      - name: Upload to Supabase Storage
        shell: bash
        run: |
          upload() {
            local file="$1"
            local path="$2"
            local content_type="${3:-application/octet-stream}"
            curl -fsSL \
              -X PUT \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: ${content_type}" \
              -H "x-upsert: true" \
              -T "${file}" \
              "${{ secrets.SUPABASE_URL }}/storage/v1/object/${{ secrets.SUPABASE_BUCKET }}/${{ steps.ver.outputs.prefix }}${path}"
          }

          SUFFIX="${{ matrix.asset_suffix }}"
          EXT="${{ matrix.archive_ext }}"
          CHANNEL="${{ steps.ver.outputs.channel }}"

          if [[ "${CHANNEL}" == "stable" ]]; then
            LATEST="catstack-latest-${SUFFIX}.${EXT}"
          else
            LATEST="catstack-dev-latest-${SUFFIX}.${EXT}"
          fi

          upload "${ASSET}" "${ASSET}"
          upload "${ASSET}" "${LATEST}"

          SHA256=$(cut -d' ' -f1 "${ASSET}.sha256")
          printf '{\n  "channel": "%s",\n  "version": "%s",\n  "filename": "%s",\n  "sha256": "%s",\n  "url": "%s",\n  "latest_url": "%s"\n}\n' \
            "${CHANNEL}" "${{ steps.ver.outputs.label }}" "${ASSET}" "${SHA256}" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/${{ steps.ver.outputs.prefix }}${ASSET}" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/${{ steps.ver.outputs.prefix }}${LATEST}" \
            > "manifest-app-${SUFFIX}.json"
          upload "manifest-app-${SUFFIX}.json" "manifest-app-${SUFFIX}.json" "application/json"

          echo "Published (${CHANNEL}):"
          echo "  ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/${{ steps.ver.outputs.prefix }}${LATEST}"
          echo "  ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/${{ steps.ver.outputs.prefix }}manifest-app-${SUFFIX}.json"

      - name: Upload artifact
        if: steps.ver.outputs.channel == 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: catstack-app-${{ steps.ver.outputs.label }}-${{ matrix.asset_suffix }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
