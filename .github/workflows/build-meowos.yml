name: Build MeowOS Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap gdisk dosfstools e2fsprogs grub-efi-amd64-bin xz-utils

      - name: Build MeowOS image
        env:
          MEOWOS_SRC: ${{ github.workspace }}
          MEOWOS_OUTPUT: /tmp/meowos.img
        run: |
          sudo -E bash build-usb/wsl-build-image.sh
          VERSION=$(cat VERSION | tr -d '\n')
          sudo xz -9 -T0 /tmp/meowos.img
          sudo mv /tmp/meowos.img.xz meowos-v${VERSION}.img.xz
          sudo chown $(id -u):$(id -g) meowos-v${VERSION}.img.xz
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Generate checksums
        run: sha256sum meowos-*.img.xz > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'meowos-*.img.xz'

      - name: Upload to Supabase Storage
        run: |
          upload() {
            local file="$1"
            local path="$2"
            local content_type="${3:-application/octet-stream}"

            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: ${content_type}" \
              -H "x-upsert: true" \
              -T "${file}" \
              "${{ secrets.SUPABASE_URL }}/storage/v1/object/${{ secrets.SUPABASE_BUCKET }}/${path}"
          }

          # Versioned copy
          upload "meowos-v${VERSION}.img.xz" "meowos-v${VERSION}.img.xz"

          # Latest (always overwritten)
          upload "meowos-v${VERSION}.img.xz" "meowos-latest.img.xz"

          # Checksums
          upload "SHA256SUMS.txt" "SHA256SUMS.txt" "text/plain"

          # Install script
          upload "install.sh" "install.sh" "text/plain"

          # Manifest
          SHA256=$(cut -d' ' -f1 SHA256SUMS.txt)
          printf '{\n  "version": "%s",\n  "filename": "meowos-v%s.img.xz",\n  "sha256": "%s",\n  "url": "%s",\n  "latest_url": "%s"\n}\n' \
            "${VERSION}" "${VERSION}" "${SHA256}" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/meowos-v${VERSION}.img.xz" \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/meowos-latest.img.xz" \
            > manifest-meowos.json
          upload "manifest-meowos.json" "manifest-meowos.json" "application/json"

          echo "Published:"
          echo "  ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/meowos-latest.img.xz"
          echo "  ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/install.sh"
          echo "  ${{ secrets.SUPABASE_URL }}/storage/v1/object/public/${{ secrets.SUPABASE_BUCKET }}/manifest-meowos.json"

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: meowos-image
          path: |
            meowos-*.img.xz
            SHA256SUMS.txt
