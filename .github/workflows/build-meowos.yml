name: Build MeowOS Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap gdisk dosfstools e2fsprogs grub-efi-amd64-bin xz-utils

      - name: Build MeowOS image
        env:
          MEOWOS_SRC: ${{ github.workspace }}
          MEOWOS_OUTPUT: /tmp/meowos.img
        run: sudo -E bash build-usb/wsl-build-image.sh

      - name: Compress image
        run: |
          VERSION=$(cat VERSION | tr -d '\n')
          xz -9 -T0 /tmp/meowos.img
          mv /tmp/meowos.img.xz meowos-v${VERSION}.img.xz

      - name: Generate checksums
        run: sha256sum meowos-*.img.xz > SHA256SUMS.txt

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meowos-*.img.xz
            SHA256SUMS.txt
          body: |
            ## MeowOS v${{ github.ref_name }}

            Flash to any SSD/USB with [balenaEtcher](https://etcher.balena.io/), plug into your rig, boot.

            **First boot:**
            1. Partition auto-expands to fill disk
            2. NVIDIA drivers install automatically
            3. Web UI starts at `http://<rig-ip>:8888`
            4. Configure your pool, wallet, and miner in 30 seconds

            **Default credentials:** `miner` / `mfarm` (change via web UI)

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: meowos-image
          path: meowos-*.img.xz
