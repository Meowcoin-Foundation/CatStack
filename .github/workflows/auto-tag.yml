name: Auto Tag on Version Change

on:
  push:
    branches: [main]
    paths: [VERSION]

jobs:
  tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check tag does not already exist
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Dispatch build workflow
        if: steps.check.outputs.exists == 'false'
        run: |
          gh workflow run build-meowos.yml --ref "v${{ steps.version.outputs.value }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
