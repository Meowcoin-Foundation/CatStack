<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatStack Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --blue: #58a6ff;
  --cyan: #39d2c0;
  --purple: #bc8cff;
  --orange: #f0883e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────────────── */

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 1px;
}

.logo span { color: var(--text-dim); font-weight: 400; }
.logo .version {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0;
  margin-left: 8px;
  opacity: 0.6;
}

.header-stats {
  display: flex;
  gap: 32px;
  font-size: 14px;
}

.header-stat {
  text-align: center;
}

.header-stat .value {
  font-size: 22px;
  font-weight: 700;
}

/* Per-algo breakdown inside the GPU Hashrate stat box. When more than one
   algo is mining across the farm we render one row per algo so totals don't
   get summed across incomparable work units. */
.header-stat .value .algo-row {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.25;
  white-space: nowrap;
}
.header-stat .value .algo-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: lowercase;
  margin-right: 6px;
  vertical-align: middle;
  letter-spacing: 0.5px;
}

.header-stat .label {
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  animation: pulse 2s infinite;
}

.status-dot.live { background: var(--green); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── Nav tabs ────────────────────────────────────────── */

nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 0;
}

nav button {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 10px 20px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

nav button:hover { color: var(--text); }
nav button.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── Main content ────────────────────────────────────── */

main { padding: 20px 24px; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Rig cards ───────────────────────────────────────── */

.rig-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.rig-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
  cursor: pointer;
}

.rig-card:hover { border-color: var(--cyan); }
.rig-card.offline { opacity: 0.6; }
.rig-card.offline .card-header { background: #1a0000; }

.card-header {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}

.card-header .rig-name {
  font-weight: 600;
  font-size: 15px;
}

.card-header .rig-status {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 12px;
}

.rig-status.online { background: rgba(63,185,80,0.15); color: var(--green); }
.rig-status.offline { background: rgba(248,81,73,0.15); color: var(--red); }
.rig-status.idle { background: rgba(210,153,34,0.15); color: var(--yellow); }
.rig-status.hot { background: rgba(248,81,73,0.3); color: var(--red); }

.card-body { padding: 12px 16px; }

.card-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
}

.card-row .label { color: var(--text-dim); }
.card-row .value { font-weight: 500; font-variant-numeric: tabular-nums; }

.gpu-temps {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.gpu-temp {
  font-size: 12px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
}

.gpu-temp.cool { background: rgba(63,185,80,0.15); color: var(--green); }
.gpu-temp.warm { background: rgba(210,153,34,0.15); color: var(--yellow); }
.gpu-temp.hot { background: rgba(248,81,73,0.15); color: var(--red); }

.card-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
}

.card-footer .tag {
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 4px;
}

/* ── Rig detail modal ────────────────────────────────── */

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  overflow-y: auto;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 90%;
  max-width: 900px;
  margin-bottom: 40px;
}

.modal-header {
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.modal-header h2 { font-size: 18px; }

.modal-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 24px; cursor: pointer;
}

.modal-close:hover { color: var(--text); }

.modal-body { padding: 20px 24px; }

.detail-section {
  margin-bottom: 20px;
}

.detail-section h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.gpu-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.gpu-table th {
  text-align: left;
  padding: 6px 10px;
  color: var(--text-dim);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.gpu-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
}

.gpu-table tr:last-child td { border-bottom: none; }

.action-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.btn:hover { border-color: var(--cyan); color: var(--cyan); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.btn.success { border-color: var(--green); color: var(--green); }

/* ── Flight sheets / OC table ────────────────────────── */

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.data-table th {
  text-align: left;
  padding: 10px 16px;
  color: var(--text-dim);
  font-weight: 500;
  background: var(--bg3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}

.data-table tr:hover td { background: var(--bg3); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── Terminal ────────────────────────────────────────── */

.terminal {
  background: #000;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.5;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  color: var(--green);
  margin-top: 12px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <span class="status-dot live"></span>
    CATSTACK <span>Dashboard</span>
    <span class="version" id="app-version" title="CatStack version"></span>
  </div>
  <div class="header-stats">
    <div class="header-stat">
      <div class="value" id="total-rigs">-</div>
      <div class="label">Rigs Online</div>
    </div>
    <div class="header-stat">
      <div class="value" id="total-hashrate">-</div>
      <div class="label">GPU Hashrate</div>
    </div>
    <div class="header-stat">
      <div class="value" id="total-cpu-hashrate">-</div>
      <div class="label">CPU Hashrate</div>
    </div>
    <div class="header-stat">
      <div class="value" id="total-gpu-power">-</div>
      <div class="label">GPU Power</div>
    </div>
    <div class="header-stat">
      <div class="value" id="total-cpu-power">-</div>
      <div class="label">CPU Power</div>
    </div>
    <div class="header-stat">
      <div class="value" id="total-accepted">-</div>
      <div class="label">Accepted</div>
    </div>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('flightsheets')">Flight Sheets</button>
  <button onclick="showTab('oc')">Overclock</button>
  <button onclick="showTab('add-rig')">+ Add Rig</button>
</nav>

<main>
  <!-- Dashboard Tab -->
  <div class="tab-content active" id="tab-dashboard">
    <!-- Bulk actions toolbar — pick rigs once, hit any button. -->
    <div id="bulk-toolbar" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:16px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
      <span style="color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:0.05em">Fleet actions</span>
      <button class="btn" onclick="bulkAction('update-miners','Update Miners')">Update Miners</button>
      <button class="btn" onclick="bulkAction('restart-miner','Restart Miner')">Restart Miner</button>
      <button class="btn" onclick="bulkAction('start-miner','Start Miner')">Start Miner</button>
      <button class="btn" onclick="bulkAction('stop-miner','Stop Miner')">Stop Miner</button>
      <button class="btn" onclick="bulkAction('reboot','Reboot Rigs')">Reboot</button>
      <button class="btn danger" onclick="bulkAction('shutdown','Shut Down Rigs')">Shutdown</button>
      <button class="btn" onclick="bulkExec()">Run Command...</button>
    </div>
    <div class="rig-grid" id="rig-grid"></div>
    <div class="empty-state" id="no-rigs" style="display:none">
      <div class="icon">&#9881;</div>
      <p>No rigs configured. Add one to get started.</p>
    </div>
    <div id="discovered-section" style="display:none;margin-top:24px">
      <h3 style="color:var(--cyan);margin-bottom:12px">New Rigs Detected (phone-home)</h3>
      <div id="discovered-list"></div>
    </div>
  </div>

  <!-- Flight Sheets Tab -->
  <div class="tab-content" id="tab-flightsheets">
    <div id="fs-list"></div>
    <details id="fs-form-details" style="margin-top:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px">
      <summary id="fs-form-summary" style="cursor:pointer;font-weight:600;color:var(--cyan)">+ Create Flight Sheet</summary>
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px">
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Name</label><input id="fs-name" placeholder="luckypepe-solo" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Coin</label><input id="fs-coin" placeholder="LKPEPE" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Miner</label><select id="fs-miner" onchange="onFSMinerChange()" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></select></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Algorithm</label><select id="fs-algo" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></select></div>
        <div style="grid-column:1/-1"><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Pool URL</label><input id="fs-pool" placeholder="stratum+tcp://pool:3333 or http://node:9778" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div style="grid-column:1/-1"><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Wallet</label><input id="fs-wallet" placeholder="Wallet address" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Password</label><input id="fs-pass" value="x" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Extra Args</label><input id="fs-extra" placeholder="--no-longpoll --segwit" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;margin-top:20px"><input type="checkbox" id="fs-solo"> Solo Mining (GBT)</label></div>
        <div></div>
        <div id="fs-solo-fields" style="grid-column:1/-1;display:none;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">RPC User</label><input id="fs-rpc-user" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
          <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">RPC Pass</label><input id="fs-rpc-pass" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
          <div style="grid-column:1/-1"><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Coinbase Address</label><input id="fs-coinbase" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        </div>
        <div style="grid-column:1/-1;margin-top:8px">
          <button id="fs-create-btn" class="btn success" onclick="createFS()">Create Flight Sheet</button>
          <button id="fs-cancel-edit-btn" class="btn" style="display:none;margin-left:8px" onclick="resetFSForm()">Cancel</button>
          <span id="fs-create-result" style="margin-left:12px;font-size:13px"></span>
        </div>
      </div>
    </details>
  </div>

  <!-- OC Tab -->
  <div class="tab-content" id="tab-oc">
    <div id="oc-list"></div>
    <details style="margin-top:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px">
      <summary style="cursor:pointer;font-weight:600;color:var(--cyan)">+ Create OC Profile</summary>
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px">
        <div style="grid-column:1/-1"><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Profile Name</label><input id="oc-name" placeholder="4070ti-mining" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Core Offset (MHz)</label><input id="oc-core" type="number" placeholder="+100" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Mem Offset (MHz)</label><input id="oc-mem" type="number" placeholder="+2000" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Core Lock (MHz)</label><input id="oc-core-lock" type="number" placeholder="2600" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Mem Lock (MHz)</label><input id="oc-mem-lock" type="number" placeholder="e.g. 12251" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Power Limit (W)</label><input id="oc-pl" type="number" placeholder="200" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div><label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Fan Speed (%)</label><input id="oc-fan" type="number" placeholder="auto" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px"></div>
        <div style="grid-column:1/-1;margin-top:8px">
          <button id="oc-create-btn" class="btn success" onclick="createOC()">Create Profile</button>
          <span id="oc-create-result" style="margin-left:12px;font-size:13px"></span>
        </div>
      </div>
    </details>
  </div>

  <!-- Add Rig Tab -->
  <div class="tab-content" id="tab-add-rig">
    <div style="max-width:500px">
      <h2 style="margin-bottom:16px">Add Rig</h2>
      <div style="margin-bottom:12px">
        <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Rig Name</label>
        <input id="add-name" type="text" placeholder="gpu-rig-01" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Host / IP</label>
        <input id="add-host" type="text" placeholder="192.168.68.xxx" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Or find by MAC Address</label>
        <div style="display:flex;gap:8px">
          <input id="add-mac" type="text" placeholder="f4:b5:20:02:56:45" style="flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
          <button class="btn" onclick="findByMac()">Scan</button>
        </div>
        <div id="mac-result" style="margin-top:6px;font-size:13px"></div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:12px">
        <div style="flex:1">
          <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">SSH Port</label>
          <input id="add-port" type="number" value="22" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
        </div>
        <div style="flex:1">
          <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">SSH User</label>
          <input id="add-user" type="text" value="root" style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
        </div>
      </div>
      <button class="btn success" onclick="addRig()" style="margin-top:8px">Add Rig</button>
      <div id="add-result" style="margin-top:12px;font-size:13px"></div>
    </div>
  </div>
</main>

<!-- Rig Detail Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Rig Detail</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let ws;
let rigData = {};

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'stats_update') {
      rigData = {};
      msg.rigs.forEach(r => rigData[r.name] = r);
      renderDashboard(msg.rigs);
    }
    if (msg.type === 'discovery') {
      renderDiscovered(msg.rigs);
    }
  };

  ws.onclose = () => setTimeout(connect, 3000);
  ws.onerror = () => ws.close();
}

function renderDashboard(rigs) {
  const grid = document.getElementById('rig-grid');
  const noRigs = document.getElementById('no-rigs');

  if (!rigs.length) {
    grid.innerHTML = '';
    noRigs.style.display = 'block';
    return;
  }
  noRigs.style.display = 'none';

  // Totals — sum GPU hashrate per-algo. Different algos have different work
  // units (xelishashv3 H/s vs yescryptR32 H/s vs equihash Sol/s), so summing
  // them into one number is meaningless. Group by algo, then render each.
  let online = 0, totalCpuHr = 0, totalGpuPwr = 0, totalCpuPwr = 0, totalAcc = 0;
  const algoTotals = {};  // {algo: hashrate_sum}
  rigs.forEach(r => {
    if (r.online && r.stats) {
      online++;
      const m = r.stats.miner || {};
      const cm = r.stats.cpu_miner || {};
      const hr = m.hashrate || 0;
      if (hr > 0) {
        // Fall back to miner name when algo is empty (rigel reports algo="")
        const algo = m.algo || m.name || 'unknown';
        algoTotals[algo] = (algoTotals[algo] || 0) + hr;
      }
      totalAcc += (m.accepted || 0) + (cm.accepted || 0);
      (r.stats.gpus || []).forEach(g => totalGpuPwr += g.power_draw || 0);
      totalCpuPwr += (r.stats.cpu || {}).power_draw || 0;
      totalCpuHr += cm.hashrate || 0;
    }
  });

  document.getElementById('total-rigs').textContent = `${online}/${rigs.length}`;
  // Render GPU hashrate broken down by algo. Single algo → plain number for
  // backward compatibility; multiple → stacked one-line-per-algo.
  const totalHashEl = document.getElementById('total-hashrate');
  const algoEntries = Object.entries(algoTotals).sort((a, b) => b[1] - a[1]);
  if (algoEntries.length === 0) {
    totalHashEl.textContent = '-';
  } else if (algoEntries.length === 1) {
    totalHashEl.textContent = fmtHash(algoEntries[0][1]);
  } else {
    totalHashEl.innerHTML = algoEntries
      .map(([algo, hr]) => `<div class="algo-row"><span class="algo-tag">${algo}</span>${fmtHash(hr)}</div>`)
      .join('');
  }
  document.getElementById('total-cpu-hashrate').textContent = fmtHash(totalCpuHr);
  document.getElementById('total-gpu-power').textContent = totalGpuPwr ? `${totalGpuPwr.toFixed(0)}W` : '-';
  document.getElementById('total-cpu-power').textContent = totalCpuPwr ? `${totalCpuPwr.toFixed(0)}W` : '-';
  document.getElementById('total-accepted').textContent = totalAcc || '-';

  grid.innerHTML = rigs.map(r => rigCard(r)).join('');
}

function rigCard(r) {
  const s = r.stats || {};
  const m = s.miner || {};
  const cm = s.cpu_miner || {};
  const gpus = s.gpus || [];
  // A rig is "mining" if either slot has a running miner. CPU-only rigs
  // like mini-02 have m empty but cm running with 20 kH/s RandomX.
  const gpuRunning = !!m.running;
  const cpuRunning = !!cm.running;
  const online = r.online && !!s.miner;
  const mining = online && (gpuRunning || cpuRunning);
  const maxTemp = Math.max(...gpus.map(g => g.temp || 0), 0);

  let status, statusClass;
  if (!r.online) { status = 'OFFLINE'; statusClass = 'offline'; }
  else if (!mining) { status = 'IDLE'; statusClass = 'idle'; }
  else if (maxTemp >= 80) { status = 'HOT'; statusClass = 'hot'; }
  else { status = 'MINING'; statusClass = 'online'; }

  // Hashrate + algo: prefer GPU miner; fall back to CPU when GPU is idle.
  const activeMiner = gpuRunning ? m : (cpuRunning ? cm : m);
  const hr = mining ? fmtHash(activeMiner.hashrate || 0) : '-';
  const algo = activeMiner.algo || m.algo || cm.algo || '-';
  // Power: GPU from nvidia-smi; CPU from its own stats block if present.
  const gpuPwr = gpus.reduce((s, g) => s + (g.power_draw || 0), 0);
  const cpuPwr = (s.cpu || {}).power_draw || 0;
  const pwr = gpuPwr + cpuPwr;
  const uptime = s.uptime_secs ? fmtUptime(s.uptime_secs) : '-';

  const temps = gpus.map(g => {
    const t = g.temp;
    if (t == null) return '';
    const cls = t >= 80 ? 'hot' : t >= 65 ? 'warm' : 'cool';
    return `<span class="gpu-temp ${cls}">${t}C</span>`;
  }).join('');

  // Shares: sum across GPU + CPU miners (so CPU-only rigs show XMRig shares).
  const acc = (m.accepted || 0) + (cm.accepted || 0);
  const rej = (m.rejected || 0) + (cm.rejected || 0);

  return `
    <div class="rig-card ${r.online ? '' : 'offline'}" onclick="openRig('${r.name}')">
      <div class="card-header">
        <span class="rig-name">${r.name}</span>
        <span class="rig-status ${statusClass}">${status}</span>
      </div>
      <div class="card-body">
        <div class="card-row"><span class="label">Hashrate</span><span class="value">${hr}</span></div>
        <div class="card-row"><span class="label">Algorithm</span><span class="value">${algo}</span></div>
        <div class="card-row"><span class="label">Power</span><span class="value">${pwr ? pwr.toFixed(0) + 'W' : '-'}</span></div>
        <div class="card-row"><span class="label">Temps</span><span class="value"><span class="gpu-temps">${temps || '-'}</span></span></div>
        <div class="card-row"><span class="label">Shares</span><span class="value">${acc}/${rej}</span></div>
        <div class="card-row"><span class="label">GPU Ping</span><span class="value" style="${(s.gpu_pool_ping_ms||0) > 100 ? 'color:var(--red)' : (s.gpu_pool_ping_ms||0) > 50 ? 'color:var(--yellow)' : 'color:var(--green)'}">${s.gpu_pool_ping_ms != null ? s.gpu_pool_ping_ms + ' ms' : '-'}</span></div>
        <div class="card-row"><span class="label">CPU Ping</span><span class="value" style="${(s.cpu_pool_ping_ms||0) > 100 ? 'color:var(--red)' : (s.cpu_pool_ping_ms||0) > 50 ? 'color:var(--yellow)' : 'color:var(--green)'}">${s.cpu_pool_ping_ms != null ? s.cpu_pool_ping_ms + ' ms' : '-'}</span></div>
        <div class="card-row"><span class="label">Uptime</span><span class="value">${uptime}</span></div>
      </div>
      <div class="card-footer">
        ${r.flight_sheet ? `<span class="tag">${r.flight_sheet}</span>` : ''}
        ${r.group ? `<span class="tag">${r.group}</span>` : ''}
        <span class="tag">${r.host}</span>
      </div>
    </div>`;
}

async function openRig(name) {
  // Force fresh stats fetch when clicking on a rig
  try {
    const res = await fetch(`/api/rigs/${name}/stats`);
    if (res.ok) {
      const fresh = await res.json();
      if (rigData[name]) rigData[name].stats = fresh;
    }
  } catch(e) {}
  const r = rigData[name];
  if (!r) return;
  const s = r.stats || {};
  const m = s.miner || {};
  const gpus = s.gpus || [];
  const cpu = s.cpu || {};
  const sys = s.system || {};

  document.getElementById('modal-title').textContent = `${name} (${r.host})`;

  let html = '';

  // Info section
  html += `<div class="detail-section">
    <h3>Info</h3>
    <div class="card-row"><span class="label">OS</span><span class="value">${r.os_info || 'unknown'}</span></div>
    <div class="card-row"><span class="label">CPU</span><span class="value">${r.cpu_model || cpu.model || 'unknown'}${cpu.sockets > 1 ? ' x' + cpu.sockets : ''}</span></div>
    <div class="card-row"><span class="label">CPU Config</span><span class="value">${cpu.cores ? cpu.cores + ' cores / ' + (cpu.threads || '') + ' threads' : '-'}</span></div>
    <div class="card-row"><span class="label">Agent</span><span class="value">${r.agent_version || s.agent_version || '-'}</span></div>
    <div class="card-row"><span class="label">Flight Sheet</span><span class="value">${r.flight_sheet || '-'}</span></div>
    <div class="card-row"><span class="label">OC Profile</span><span class="value">${r.oc_profile || '-'}</span></div>
    <div class="card-row"><span class="label">Uptime</span><span class="value">${s.uptime_secs ? fmtUptime(s.uptime_secs) : '-'}</span></div>
    <div class="card-row"><span class="label">CPU Temp</span><span class="value" style="${(cpu.temp||0) >= 80 ? 'color:var(--red)' : (cpu.temp||0) >= 65 ? 'color:var(--yellow)' : 'color:var(--green)'}">${cpu.temp ? cpu.temp + 'C' : '-'}</span></div>
    <div class="card-row"><span class="label">CPU Freq</span><span class="value">${cpu.freq_mhz ? cpu.freq_mhz + ' MHz' : '-'}</span></div>
    <div class="card-row"><span class="label">CPU Power</span><span class="value">${cpu.power_draw != null ? cpu.power_draw.toFixed(1) + 'W' : '-'}</span></div>
    <div class="card-row"><span class="label">CPU Usage</span><span class="value">${cpu.usage_pct != null ? cpu.usage_pct + '%' : '-'}</span></div>
    <div class="card-row"><span class="label">Load</span><span class="value">${sys.load_1m ?? '-'}</span></div>
    <div class="card-row"><span class="label">RAM</span><span class="value">${sys.mem_used_mb && sys.mem_total_mb ? `${sys.mem_used_mb}/${sys.mem_total_mb} MB` : '-'}</span></div>
  </div>`;

  // Flight Sheet picker — change which flight sheet this rig runs.
  // Dropdown is populated async by populateFlightSheetSelect() once the modal renders.
  html += `<div class="detail-section">
    <h3>Flight Sheet</h3>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="fs-select-${name}" style="flex:1;min-width:220px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px">
        <option value="">Loading...</option>
      </select>
      <button class="btn success" onclick="applyFlightSheetToRig('${name}')">Apply</button>
    </div>
    <div id="fs-result-${name}" style="margin-top:10px;font-size:13px"></div>
  </div>`;

  // External chassis fans (Octominer only)
  const chassis = sys.chassis || {};
  if (chassis.is_octominer) {
    const fans = Array.isArray(chassis.external_fans) ? chassis.external_fans : [];
    html += `<div class="detail-section">
      <h3>External Chassis Fans <span style="font-size:12px;color:var(--text-muted);font-weight:normal;margin-left:8px">${chassis.product || 'Octominer'}</span></h3>
      <p style="color:var(--text-muted);font-size:12px;margin:-4px 0 12px 0">
        Octominer chassis fans. Setting persists until reboot.
      </p>`;
    if (!fans.length) {
      html += `<div style="padding:12px;background:var(--bg3);border:1px dashed var(--border);border-radius:6px;color:var(--text-muted);font-size:13px">
        Chassis detected (${chassis.vendor} ${chassis.product}), but no PWM controls found via standard hwmon. The X12ULTRA exposes fans through an I2C MCU rather than a Super-I/O chip — install <code>i2c-tools</code> on the rig and the agent will need an X12ULTRA-specific driver to control them.
      </div>
    </div>`;
    } else {
      html += `<div style="display:flex;flex-wrap:wrap;gap:12px">
        ${fans.map(f => `
          <div style="flex:1;min-width:180px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px">
            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Fan ${f.index + 1}${f.rpm != null ? ' · ' + f.rpm + ' RPM' : ''}</div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="number" id="extfan-${f.index}" min="0" max="100" value="${f.pwm_pct ?? ''}" placeholder="0-100"
                style="flex:1;padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:monospace">
              <span style="color:var(--text-dim);font-size:13px">%</span>
              <button class="btn" style="padding:6px 10px;font-size:12px" onclick="setExternalFan('${name}',${f.index})">Set</button>
            </div>
          </div>`).join('')}
      </div>
      <div id="extfan-result" style="margin-top:8px;font-size:13px"></div>
    </div>`;
    }
  }

  // GPU table
  if (gpus.length) {
    html += `<div class="detail-section">
      <h3>GPUs (${gpus.length})</h3>
      <table class="gpu-table">
        <tr><th>GPU</th><th>Name</th><th>Core</th><th>Mem</th><th>Fan</th><th>Core Clk</th><th>Mem Clk</th><th>Power</th><th>Hashrate</th></tr>
        ${gpus.map(g => {
          const tc = (g.temp || 0) >= 80 ? 'color:var(--red)' : (g.temp || 0) >= 65 ? 'color:var(--yellow)' : 'color:var(--green)';
          const mc = (g.mem_temp || 0) >= 100 ? 'color:var(--red)' : (g.mem_temp || 0) >= 85 ? 'color:var(--yellow)' : 'color:var(--green)';
          return `<tr>
            <td>${g.index ?? '?'}</td>
            <td>${g.name || 'Unknown'}</td>
            <td style="${tc};font-weight:600">${g.temp != null ? g.temp + 'C' : '-'}</td>
            <td style="${mc};font-weight:600">${g.mem_temp != null ? g.mem_temp + 'C' : '-'}</td>
            <td>${g.fan != null ? g.fan + '%' : '-'}</td>
            <td>${g.core_clock || '-'}</td>
            <td>${g.mem_clock || '-'}</td>
            <td>${g.power_draw ? g.power_draw.toFixed(0) + 'W' : '-'}</td>
            <td>${g.hashrate ? fmtHash(g.hashrate) : '-'}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
  }

  // Hashrate history chart
  html += `<div class="detail-section">
    <h3>Hashrate (24h)</h3>
    <div style="position:relative;height:200px;margin-top:8px"><canvas id="hr-chart"></canvas></div>
  </div>`;

  // Miner section(s) — show GPU and CPU separately when both are running
  // (dual-mining setups like rigAI-02 have ccminer+XMRig active simultaneously).
  const cm2 = s.cpu_miner || {};
  const showGpuBlock = !!(m.name || m.algo || m.hashrate || m.running);
  const showCpuBlock = !!(cm2.algo || cm2.hashrate || cm2.running);
  // Header label: "GPU Miner" / "CPU Miner" only if both blocks render, to
  // avoid redundant labeling on single-miner rigs.
  const gpuLabel = (showGpuBlock && showCpuBlock) ? 'GPU Miner' : 'Miner';
  if (showGpuBlock) {
    html += `<div class="detail-section">
      <h3>${gpuLabel}</h3>
      <div class="card-row"><span class="label">Software</span><span class="value">${m.name || '-'} ${m.version || ''}</span></div>
      <div class="card-row"><span class="label">Algorithm</span><span class="value">${m.algo || '-'}</span></div>
      <div class="card-row"><span class="label">Pool</span><span class="value" style="word-break:break-all">${m.pool || '-'}</span></div>
      <div class="card-row"><span class="label">Hashrate</span><span class="value">${m.hashrate ? fmtHash(m.hashrate) : '-'}</span></div>
      <div class="card-row"><span class="label">Accepted</span><span class="value" style="color:var(--green)">${m.accepted || 0}</span></div>
      <div class="card-row"><span class="label">Rejected</span><span class="value" style="color:var(--red)">${m.rejected || 0}</span></div>
      <div class="card-row"><span class="label">Restarts</span><span class="value">${m.restarts || 0}</span></div>
    </div>`;
  }
  if (showCpuBlock) {
    html += `<div class="detail-section">
      <h3>CPU Miner</h3>
      <div class="card-row"><span class="label">Software</span><span class="value">${cm2.name || 'XMRig'} ${cm2.version || ''}</span></div>
      <div class="card-row"><span class="label">Algorithm</span><span class="value">${cm2.algo || '-'}</span></div>
      <div class="card-row"><span class="label">Pool</span><span class="value" style="word-break:break-all">${cm2.pool || '-'}</span></div>
      <div class="card-row"><span class="label">Hashrate</span><span class="value">${cm2.hashrate ? fmtHash(cm2.hashrate) : '-'}</span></div>
      <div class="card-row"><span class="label">Accepted</span><span class="value" style="color:var(--green)">${cm2.accepted || 0}</span></div>
      <div class="card-row"><span class="label">Rejected</span><span class="value" style="color:var(--red)">${cm2.rejected || 0}</span></div>
      <div class="card-row"><span class="label">Restarts</span><span class="value">${cm2.restarts || 0}</span></div>
    </div>`;
  }

  // ── GPU Overclock (inline, HiveOS-style) ──
  // Six direct-input fields. Empty = leave that setting alone / clear it.
  // Values are loaded async in populateOcCard() right after the modal opens.
  const ocInput = (id, label, unit, placeholder) => `
    <div style="flex:1;min-width:150px">
      <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">${label} <span style="color:var(--text-dim);text-transform:none">${unit}</span></label>
      <input type="number" id="oc-${id}" placeholder="${placeholder || ''}"
        style="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:monospace">
    </div>`;
  html += `<div class="detail-section">
    <h3>GPU Overclock <span id="oc-profile-tag" style="font-size:12px;color:var(--text-muted);font-weight:normal;margin-left:8px"></span></h3>
    <p style="color:var(--text-muted);font-size:12px;margin:-4px 0 12px 0">
      Leave a box empty to skip that setting. Applies immediately and persists across reboots.
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px">
      ${ocInput('core-offset', 'Core Offset',  'MHz', 'e.g. +150')}
      ${ocInput('core-lock',   'Core Clock Lock', 'MHz', 'e.g. 1400')}
      ${ocInput('mem-offset',  'Memory Offset', 'MHz', 'e.g. +1000')}
      ${ocInput('mem-lock',    'Memory Clock Lock', 'MHz', 'e.g. 9500')}
      ${ocInput('power-limit', 'Power Limit', 'W',   'e.g. 220')}
      ${ocInput('fan-speed',   'Fan Speed',   '%',   'e.g. 70')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn success" onclick="applyInlineOc('${name}')">Apply</button>
      <button class="btn" onclick="clearOcInputs()">Clear Fields</button>
      <button class="btn danger" onclick="resetOc('${name}')">Reset GPU to Stock</button>
      <button class="btn" onclick="saveOcAsProfile('${name}')" style="margin-left:auto">Save as Profile</button>
    </div>
    <div id="oc-result" style="margin-top:10px;font-size:13px"></div>
  </div>`;

  // Actions
  html += `<div class="detail-section">
    <h3>Actions</h3>
    <div class="action-buttons">
      <button class="btn" onclick="rigAction('${name}','restart-miner')">Restart Miner</button>
      <button class="btn" onclick="rigAction('${name}','stop-miner')">Stop Miner</button>
      <button class="btn danger" onclick="rigAction('${name}','reboot')">Reboot Rig</button>
      <button class="btn" onclick="openSSH('${name}')">SSH Terminal</button>
      <button class="btn" onclick="viewMinerLog('${name}','gpu')">GPU Miner Log</button>
      <button class="btn" onclick="viewMinerLog('${name}','cpu')">CPU Miner Log</button>
      <button class="btn" onclick="updateMiners('${name}')">Update Miners</button>
      <button class="btn" onclick="pushSshKey('${name}')">Push SSH Key</button>
      <button class="btn" onclick="renameRig('${name}')">Rename</button>
      <button class="btn danger" onclick="deleteRig('${name}')">Remove Rig</button>
    </div>
    <div class="terminal" id="term-${name}" style="display:none"></div>
  </div>`;

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('active');

  // Load hashrate history chart + current OC values
  loadHashrateChart(name);
  populateOcCard(name);
  populateFlightSheetSelect(name);
}

async function populateFlightSheetSelect(rigName) {
  const sel = document.getElementById(`fs-select-${rigName}`);
  if (!sel) return;
  try {
    const res = await fetch('/api/flightsheets');
    const sheets = await res.json();
    if (!sheets.length) {
      sel.innerHTML = '<option value="">(no flight sheets — create one in the Flight Sheets tab)</option>';
      return;
    }
    const current = (rigData[rigName] || {}).flight_sheet || '';
    sel.innerHTML = sheets.map(fs =>
      `<option value="${fs.name}"${fs.name === current ? ' selected' : ''}>${fs.name} — ${fs.coin} (${fs.miner})</option>`
    ).join('');
  } catch (e) {
    sel.innerHTML = `<option value="">Error loading flight sheets: ${e.message}</option>`;
  }
}

async function applyFlightSheetToRig(rigName) {
  const sel = document.getElementById(`fs-select-${rigName}`);
  const result = document.getElementById(`fs-result-${rigName}`);
  if (!sel || !sel.value) {
    if (result) result.innerHTML = '<span style="color:var(--red)">Select a flight sheet first</span>';
    return;
  }
  const fsName = sel.value;
  if (result) result.innerHTML = '<span style="color:var(--text-muted)">Applying...</span>';
  try {
    const res = await fetch(`/api/flightsheets/${fsName}/apply/${rigName}`, { method: 'POST' });
    const data = await res.json();
    const status = (data.results || {})[rigName] || 'no result';
    const ok = typeof status === 'string' && !status.startsWith('error');
    if (result) result.innerHTML = `<span style="color:var(--${ok ? 'green' : 'red'})">${ok ? '&#10003; ' : ''}${status}</span>`;
    if (ok) {
      if (typeof toast === 'function') toast(`Flight sheet "${fsName}" applied to ${rigName}`);
      if (rigData[rigName]) rigData[rigName].flight_sheet = fsName;
    }
  } catch (e) {
    if (result) result.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
  }
}

// ── Inline OC card handlers ──

async function populateOcCard(rigName) {
  try {
    const res = await fetch(`/api/rigs/${rigName}/oc`);
    if (!res.ok) return;
    const oc = await res.json();
    const setIf = (id, v) => {
      const el = document.getElementById(id);
      if (el) el.value = (v == null ? '' : v);
    };
    setIf('oc-core-offset', oc.core_offset);
    setIf('oc-mem-offset',  oc.mem_offset);
    setIf('oc-core-lock',   oc.core_lock);
    setIf('oc-mem-lock',    oc.mem_lock);
    setIf('oc-power-limit', oc.power_limit);
    setIf('oc-fan-speed',   oc.fan_speed);
    const tag = document.getElementById('oc-profile-tag');
    if (tag) {
      if (oc.profile_name) {
        tag.textContent = `bound to profile: ${oc.profile_name}`;
      } else if (oc.is_inline) {
        tag.textContent = 'inline settings';
      } else {
        tag.textContent = 'no OC applied';
      }
    }
  } catch(e) { /* first-time rig, fields just stay empty */ }
}

function readOcInputs() {
  const n = id => {
    const v = (document.getElementById(id) || {}).value;
    if (v == null || v === '') return null;
    const num = parseInt(v, 10);
    return Number.isFinite(num) ? num : null;
  };
  return {
    core_offset: n('oc-core-offset'),
    mem_offset:  n('oc-mem-offset'),
    core_lock:   n('oc-core-lock'),
    mem_lock:    n('oc-mem-lock'),
    power_limit: n('oc-power-limit'),
    fan_speed:   n('oc-fan-speed'),
  };
}

function clearOcInputs() {
  ['oc-core-offset','oc-mem-offset','oc-core-lock','oc-mem-lock','oc-power-limit','oc-fan-speed']

let _hrChart = null;

// Palette for per-algo series. Picked to be distinguishable on dark bg.
const ALGO_COLORS = [
  '#00d4aa', // teal (primary / most common)
  '#f472b6', // pink
  '#60a5fa', // blue
  '#c084fc', // purple
  '#fbbf24', // amber
  '#34d399', // emerald
];
function colorForAlgo(algoList, algo) {
  const idx = algoList.indexOf(algo);
  return ALGO_COLORS[idx % ALGO_COLORS.length];
}

// Algo hashrates have wildly different magnitudes (Equihash ~500 Sol/s vs
// RandomX ~20,000 H/s vs KawPow ~30,000,000 H/s). Show a sensible unit per
// algo so the legend + tooltips aren't misleading. If we don't recognise the
// algo we fall through to a generic H/s label.
function unitForAlgo(algo) {
  const a = (algo || '').toLowerCase();
  if (a.includes('equihash')) return 'Sol/s';
  if (a.includes('randomx') || a.startsWith('rx/') ||
      a.startsWith('cn') || a.includes('ghostrider')) return 'H/s';
  if (a.includes('kawpow') || a.includes('ethash') || a.includes('autolykos') ||
      a.includes('octopus') || a.includes('blake3')) return 'MH/s';
  return 'H/s';
}
function scaleForAlgo(algo) {
  // Scale factor to convert raw H/s into the display unit above.
  return unitForAlgo(algo) === 'MH/s' ? 1e-6 : 1;
}

async function loadHashrateChart(rigName) {
  const canvas = document.getElementById('hr-chart');
  if (!canvas) return;
  try {
    const res = await fetch(`/api/rigs/${rigName}/history?hours=24`);
    const data = await res.json();
    if (_hrChart) { _hrChart.destroy(); _hrChart = null; }
    if (!data.length) {
      canvas.parentElement.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px 0">No history yet. Data accumulates every 60 seconds.</p>';
      return;
    }

    const labels = data.map(d => {
      const dt = new Date(d.t + 'Z');
      return dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    });
    const pwData = data.map(d => d.power);

    // Build one hashrate series per distinct algo. Each sample only appears
    // in its own algo's series (other algos get null at that index), so
    // switching algos produces a real visible gap instead of a spurious
    // jump from 500 Sol/s to 20k H/s on one continuous line.
    const algos = [];
    for (const d of data) {
      const a = d.algo || 'unknown';
      if (!algos.includes(a)) algos.push(a);
    }
    const hashrateDatasets = algos.map(algo => {
      const color = colorForAlgo(algos, algo);
      const unit = unitForAlgo(algo);
      const scale = scaleForAlgo(algo);
      const series = data.map(d => {
        if ((d.algo || 'unknown') !== algo) return null;
        return (d.hr || 0) * scale;
      });
      return {
        label: `${algo} (${unit})`,
        data: series,
        borderColor: color,
        backgroundColor: color + '22', // ~13% alpha
        fill: algos.length === 1,      // only fill if one algo (cleaner visual)
        tension: 0.3, pointRadius: 0, borderWidth: 2,
        yAxisID: 'y',
        spanGaps: false,               // draw a gap when algo is not active
      };
    });

    const datasets = [
      ...hashrateDatasets,
      { label: 'Power (W)', data: pwData, borderColor: '#f59e0b',
        backgroundColor: 'transparent', fill: false, tension: 0.3,
        pointRadius: 0, borderWidth: 1.5, yAxisID: 'y1' },
    ];

    // Decide the left-axis title. If every sample is the same algo we can
    // use that algo's natural unit; otherwise we show the dominant algo's
    // unit and rely on the legend to disambiguate.
    const dominant = algos[0] || '';
    const unitLabel = unitForAlgo(dominant);

    _hrChart = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#aaa', boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              // Show the unit next to the value so mixed-algo tooltips are readable.
              label: (ctx) => {
                const v = ctx.parsed.y;
                if (v == null) return null;
                return `${ctx.dataset.label}: ${v.toFixed(2)}`;
              },
            },
          },
        },
        scales: {
          x: { ticks: { color: '#666', maxTicksLimit: 12, font: { size: 10 } },
               grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { position: 'left',
               ticks: { color: '#00d4aa', font: { size: 10 } },
               grid: { color: 'rgba(255,255,255,0.05)' },
               title: { display: true, text: `Hashrate (${unitLabel})`,
                        color: '#00d4aa', font: { size: 10 } } },
          y1: { position: 'right',
                ticks: { color: '#f59e0b', font: { size: 10 } },
                grid: { drawOnChartArea: false },
                title: { display: true, text: 'Watts',
                         color: '#f59e0b', font: { size: 10 } } },
        },
      },
    });
  } catch(e) {
    canvas.parentElement.innerHTML = `<p style="color:var(--red);text-align:center">Failed to load history: ${e.message}</p>`;
  }
}

// ── Bulk fleet actions ─────────────────────────────────────────────
//
// Reuses the existing pickTarget multi-select modal to choose rigs, then
// calls /api/bulk/{action}/{target}. Backend dispatches the action to each
// rig in parallel and returns per-rig results.

const BULK_DESTRUCTIVE = new Set(['reboot', 'shutdown', 'exec']);

async function bulkAction(action, label) {
  const target = await pickTarget(`${label}: select rigs`);
  if (!target) return;
  const targetCount = target === 'all'
    ? Object.keys(rigData).length
    : target.split(',').length;
  if (BULK_DESTRUCTIVE.has(action)) {
    if (!confirm(`${label} on ${targetCount} rig${targetCount===1?'':'s'}?\n\nTarget: ${target}`)) return;
  }
  await runBulk(action, target, label, null);
}

async function bulkExec() {
  const command = prompt('Shell command to run on selected rigs:\n(runs as the rig\'s configured SSH user)');
  if (!command) return;
  const target = await pickTarget(`Run "${command.length > 40 ? command.slice(0,40)+'…' : command}": select rigs`);
  if (!target) return;
  const targetCount = target === 'all'
    ? Object.keys(rigData).length
    : target.split(',').length;
  if (!confirm(`Run command on ${targetCount} rig${targetCount===1?'':'s'}?\n\n${command}`)) return;
  await runBulk('exec', target, 'Command', command);
}

async function runBulk(action, target, label, command) {
  // Show a results overlay so output stays visible while requests complete.
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay active';
  overlay.id = 'bulk-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:900px">
      <div class="modal-header">
        <h2>Bulk: ${label}</h2>
        <button class="modal-close" onclick="document.getElementById('bulk-overlay').remove()">&times;</button>
      </div>
      <div style="padding:12px 16px;color:var(--text-dim);font-size:13px;border-bottom:1px solid var(--border)">
        Target: <code>${target}</code>${command ? ' · Command: <code>'+escapeHtml(command)+'</code>' : ''}
      </div>
      <div id="bulk-results" class="terminal" style="height:auto;max-height:60vh;margin:0;border-radius:0 0 12px 12px;font-size:12px;line-height:1.5;padding:14px;white-space:pre-wrap;word-break:break-all">Running…</div>
    </div>`;
  document.body.appendChild(overlay);

  try {
    const url = `/api/bulk/${encodeURIComponent(action)}/${encodeURIComponent(target)}`;
    const opts = { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({command}) };
    const res = await fetch(url, opts);
    const data = await res.json();
    const out = document.getElementById('bulk-results');
    if (!out) return;
    if (!res.ok) {
      out.textContent = `HTTP ${res.status}: ${data.detail || JSON.stringify(data)}`;
      return;
    }
    // Format: per-rig, sorted, with brief status for non-exec and full
    // stdout/stderr/rc for exec.
    const lines = [];
    const results = data.results || {};
    for (const name of Object.keys(results).sort()) {
      const r = results[name];
      if (typeof r === 'string') {
        lines.push(`${name.padEnd(20)} ${r}`);
      } else if (r && typeof r === 'object' && 'rc' in r) {
        lines.push(`╭─ ${name} (rc=${r.rc}) ─`);
        if (r.stdout) lines.push(r.stdout.replace(/^/gm, '│ '));
        if (r.stderr) lines.push(r.stderr.replace(/^/gm, '│ [stderr] '));
        lines.push(`╰─`);
      } else {
        lines.push(`${name.padEnd(20)} ${JSON.stringify(r)}`);
      }
    }
    out.textContent = lines.join('\n') || '(no rigs matched)';
  } catch (e) {
    const out = document.getElementById('bulk-results');
    if (out) out.textContent = `Error: ${e.message}`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

async function sshExec(name) {
  const input = document.getElementById('ssh-input');
  const output = document.getElementById('ssh-output');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  output.textContent += '$ ' + cmd + '\n';
  try {
    const res = await fetch(`/api/rigs/${name}/exec`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd }),
    });
    const data = await res.json();
    if (data.stdout) output.textContent += data.stdout;
    if (data.stderr) output.textContent += data.stderr;
    if (!data.stdout && !data.stderr) output.textContent += '\n';
  } catch (e) {
    output.textContent += 'Error: ' + e.message + '\n';
  }
  output.scrollTop = output.scrollHeight;
  input.focus();
}

function closeSSH() {
  const el = document.getElementById('ssh-overlay');
  if (el) el.remove();
}

function closeConsole() {
  if (consoleInterval) { clearInterval(consoleInterval); consoleInterval = null; }
  const overlay = document.getElementById('console-overlay');
  if (overlay) overlay.remove();
}

async function refreshConsole(name, type) {
  try {
    const res = await fetch(`/api/rigs/${name}/miner-log/${type}?lines=80`);
    const data = await res.json();
    const el = document.getElementById('console-output');
    if (el) {
      el.textContent = data.log || 'No log output';
      el.scrollTop = el.scrollHeight;
    }
  } catch(e) {}
}

function toggleAutoRefresh(name, type) {
  const checked = document.getElementById('console-auto').checked;
  if (checked) {
    if (!consoleInterval) consoleInterval = setInterval(() => refreshConsole(name, type), 2000);
  } else {
    if (consoleInterval) { clearInterval(consoleInterval); consoleInterval = null; }
  }
}

async function minerCmd(name, type, command) {
  const el = document.getElementById('console-output');
  if (!el) return;
  el.textContent += `\n\n>>> ${command.toUpperCase()} <<<\nQuerying...\n`;
  el.scrollTop = el.scrollHeight;
  try {
    const res = await fetch(`/api/rigs/${name}/miner-api/${type}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ command }),
    });
    const data = await res.json();
    if (data.raw) {
      el.textContent += data.result;
    } else {
      el.textContent += JSON.stringify(data.result, null, 2);
    }
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    el.textContent += `Error: ${e.message}`;
  }
}

// Keyed by fs.name, populated by loadFlightSheets. The Edit button passes
// just the name into editFS() and looks up the full record here, so we
// don't have to embed JSON in an HTML attribute (which breaks attribute
// parsing once the JSON contains escaped quotes).
let _fsCache = {};

async function loadFlightSheets() {
  const res = await fetch('/api/flightsheets');
  const sheets = await res.json();
  _fsCache = {};
  sheets.forEach(s => { _fsCache[s.name] = s; });
  const div = document.getElementById('fs-list');

  if (!sheets.length) {
    div.innerHTML = '<div class="empty-state"><div class="icon">&#128221;</div><p>No flight sheets yet. Create one below.</p></div>';
    return;
  }

  // Shorten a long wallet: first 6 + last 4 with monospace + full as tooltip
  const shortWallet = w => {
    if (!w) return '';
    if (w.length <= 14) return w;
    return `${w.slice(0, 6)}…${w.slice(-4)}`;
  };

  div.innerHTML = `<table class="data-table">
    <tr><th>Name</th><th>Coin</th><th>Algo</th><th>Miner</th><th>Pool</th><th>Wallet</th><th>Solo</th><th>Actions</th></tr>
    ${sheets.map(fs => `<tr>
      <td style="color:var(--cyan);font-weight:600">${fs.name}</td>
      <td style="color:var(--yellow)">${fs.coin}</td>
      <td>${fs.algo}</td>
      <td style="color:var(--green)">${fs.miner}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fs.pool_url}</td>
      <td style="font-family:monospace;font-size:12px;color:var(--text-muted)" title="${fs.wallet || ''}\nClick to copy" onclick="navigator.clipboard.writeText('${fs.wallet || ''}').then(()=>toast('Wallet copied'))" role="button">${shortWallet(fs.wallet)}</td>
      <td>${fs.is_solo ? 'Yes' : ''}</td>
      <td style="display:flex;gap:6px"><button class="btn" onclick="applyFS('${fs.name}')">Apply</button><button class="btn" onclick="editFS('${fs.name}')">Edit</button><button class="btn danger" onclick="deleteFS('${fs.name}')">Delete</button></td>
    </tr>`).join('')}
  </table>`;
}

// Lightweight toast (no deps) – shown for 1.5s
function toast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);padding:10px 18px;border:1px solid var(--border);border-radius:6px;z-index:9999;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.4)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 1500);
}

// ── Formatters ──

function fmtHash(h) {
  if (!h || h === 0) return '-';
  if (h >= 1e12) return (h/1e12).toFixed(2) + ' TH/s';
  if (h >= 1e9) return (h/1e9).toFixed(2) + ' GH/s';
  if (h >= 1e6) return (h/1e6).toFixed(2) + ' MH/s';
  if (h >= 1e3) return (h/1e3).toFixed(2) + ' KH/s';
  return h.toFixed(1) + ' H/s';
}

function fmtUptime(secs) {
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function renderDiscovered(rigs) {
  const section = document.getElementById('discovered-section');
  const list = document.getElementById('discovered-list');
  // Backend's /api/discovered already filters out claimed-MAC + IP-match +
  // hostname-match rigs, so anything that comes through is genuinely new.
  if (!rigs.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = `<table class="data-table">
    <tr><th>Hostname</th><th>IP</th><th>MAC</th><th>Interface</th><th>Seen</th><th>Action</th></tr>
    ${rigs.map(r => `<tr>
      <td style="color:var(--cyan);font-weight:600">${r.hostname}</td>
      <td>${r.ip}</td>
      <td style="font-family:monospace">${r.mac}</td>
      <td>${r.interface}</td>
      <td>${r.age_secs < 60 ? r.age_secs + 's ago' : Math.round(r.age_secs/60) + 'm ago'}</td>
      <td>
        <button class="btn success" onclick="quickAddRig('${r.ip}','${r.hostname}')">+ Add</button>
        <button class="btn" onclick="dismissDiscovered('${r.mac}')" title="Hide this rig from the discovery list (won't appear again)">Dismiss</button>

async function dismissDiscovered(mac) {
  try {
    await fetch(`/api/discovered/${encodeURIComponent(mac)}/dismiss`, { method: 'POST' });

    const res = await fetch('/api/discovered');
    const rigs = await res.json();
    renderDiscovered(rigs);
  } catch(e) { alert(e.message); }

async function quickAddRig(ip, hostname) {
  const name = prompt('Rig name:', hostname);
  if (!name) return;
  try {

    if (res.ok) { alert(`Added ${name} (${ip})`); }
    else { const err = await res.json(); alert(err.detail); }
  } catch(e) { alert(e.message); }

// Multi-select rig picker. Resolves to a string: either "all" (if every rig
// is selected) or a comma-separated list like "rig-02,rig-06". Returns null
// on cancel. Backend's resolve_targets understands both.
function pickTarget(title) {
  return new Promise(resolve => {
    const rigs = Object.keys(rigData).sort();
    if (rigs.length === 0) {
      alert('No rigs configured yet. Add a rig first.');
      resolve(null);
      return;
    }

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;justify-content:center;align-items:center';
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:380px;max-width:480px;max-height:80vh;display:flex;flex-direction:column';

    const rigRow = (n) => {
      const d = rigData[n] || {};
      const host = d.host ? ` (${d.host})` : '';
      const fs = d.flight_sheet ? `<span style="color:var(--text-muted);font-size:11px;margin-left:8px">fs=${d.flight_sheet}</span>` : '';
      return `<label style="display:flex;align-items:center;padding:8px 4px;border-radius:4px;cursor:pointer" onmouseenter="this.style.background='var(--bg3)'" onmouseleave="this.style.background=''">
        <input type="checkbox" class="pick-rig" value="${n}" style="margin-right:10px;width:16px;height:16px;cursor:pointer">
        <span style="flex:1"><span style="font-weight:600">${n}</span><span style="color:var(--text-muted);font-size:12px">${host}</span>${fs}</span>
      </label>`;
    };

    box.innerHTML = `
      <h3 style="margin-bottom:12px;font-size:15px">${title}</h3>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="btn" id="pick-all" style="flex:1;font-size:12px;padding:6px 10px">Select All</button>
        <button class="btn" id="pick-none" style="flex:1;font-size:12px;padding:6px 10px">Clear</button>
        <button class="btn" id="pick-invert" style="flex:1;font-size:12px;padding:6px 10px">Invert</button>
      </div>
      <div id="pick-list" style="overflow-y:auto;flex:1;border:1px solid var(--border);border-radius:6px;padding:4px;margin-bottom:14px;max-height:50vh">
        ${rigs.map(rigRow).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
        <span id="pick-count" style="margin-right:auto;color:var(--text-muted);font-size:13px">0 of ${rigs.length} selected</span>
        <button class="btn" id="pick-cancel">Cancel</button>
        <button class="btn success" id="pick-ok" disabled>Apply</button>
      </div>`;

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    const boxes = () => Array.from(box.querySelectorAll('.pick-rig'));
    const updateCount = () => {
      const checked = boxes().filter(b => b.checked).length;
      box.querySelector('#pick-count').textContent =
        `${checked} of ${rigs.length} selected`;
      box.querySelector('#pick-ok').disabled = (checked === 0);
    };
    boxes().forEach(b => b.addEventListener('change', updateCount));
    box.querySelector('#pick-all').onclick = () => { boxes().forEach(b => b.checked = true); updateCount(); };
    box.querySelector('#pick-none').onclick = () => { boxes().forEach(b => b.checked = false); updateCount(); };
    box.querySelector('#pick-invert').onclick = () => { boxes().forEach(b => b.checked = !b.checked); updateCount(); };

    const close = (val) => { document.body.removeChild(overlay); resolve(val); };
    overlay.addEventListener('click', e => { if (e.target === overlay) close(null); });
    box.querySelector('#pick-cancel').onclick = () => close(null);
    box.querySelector('#pick-ok').onclick = () => {
      const selected = boxes().filter(b => b.checked).map(b => b.value);
      if (selected.length === 0) return;
      // Optimisation: "all" keeps old semantics and is simpler to read in logs
      const target = (selected.length === rigs.length) ? 'all' : selected.join(',');
      close(target);
    };
    updateCount();
  });
}

// Solo checkbox toggle
document.getElementById('fs-solo').addEventListener('change', e => {
  document.getElementById('fs-solo-fields').style.display = e.target.checked ? 'grid' : 'none';
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Start
async function loadVersion() {
  try {
    const res = await fetch('/api/version');
    const data = await res.json();
    document.getElementById('app-version').textContent = 'v' + data.version;
  } catch (e) {
    // non-fatal
  }
}
loadVersion();
connect();
</script>
